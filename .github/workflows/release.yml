name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      build_target:
        description: "Which release artifact set to build"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - windows
          - android
      release_tag:
        description: "Optional existing tag to attach dispatch-built artifacts to"
        required: false
        type: string

permissions:
  contents: write

jobs:
  windows:
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.build_target == 'all' || inputs.build_target == 'windows' }}
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install toolchain
        run: npm install -g pnpm@10.24.0 vite-plus@0.1.24

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Windows installer
        run: pnpm dist:desktop:win
        env:
          VIPERCODE_DESKTOP_UPDATE_REPOSITORY: ${{ github.repository }}

      - name: List artifacts
        run: Get-ChildItem release | Select-Object Name, Length
        shell: pwsh

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/*.exe
            release/*.exe.blockmap
            release/latest.yml
          generate_release_notes: true

  android:
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.build_target == 'all' || inputs.build_target == 'android' }}
    runs-on: blacksmith-8vcpu-ubuntu-2404
    env:
      EXPO_PUBLIC_VIPERCODE_CLERK_PUBLISHABLE_KEY: ${{ secrets.EXPO_PUBLIC_VIPERCODE_CLERK_PUBLISHABLE_KEY }}
      EXPO_PUBLIC_VIPERCODE_CLERK_JWT_TEMPLATE: ${{ secrets.EXPO_PUBLIC_VIPERCODE_CLERK_JWT_TEMPLATE }}
      EXPO_PUBLIC_VIPERCODE_RELAY_URL: ${{ secrets.EXPO_PUBLIC_VIPERCODE_RELAY_URL }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install toolchain
        run: npm install -g pnpm@10.24.0

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Diagnose + fix the prebuilt Hermes compiler that release builds invoke
      # (debug/preview skip Hermes AOT). pnpm's store layout can leave it
      # non-executable or as a dangling symlink.
      # React Native 0.85 ships the Hermes compiler in the separate
      # `hermes-compiler` package, but gradle's BundleHermesCTask invokes the
      # hardcoded `react-native/sdks/hermesc/<os>-bin/hermesc`. Under pnpm that
      # path is never populated (no postinstall; Expo resolves hermes-compiler
      # directly), so release builds fail to start the (missing) binary.
      # Materialize it from hermes-compiler and make it executable.
      - name: Provision Hermes compiler for gradle
        run: |
          set -eu
          hc="$(find node_modules/.pnpm -type d -path '*hermes-compiler@*/node_modules/hermes-compiler/hermesc' 2>/dev/null | head -1)"
          echo "hermes-compiler hermesc: '$hc'"
          [ -n "$hc" ] || { echo "hermes-compiler not found"; exit 1; }
          for rn in $(find node_modules/.pnpm -type d -path '*react-native@*/node_modules/react-native' 2>/dev/null); do
            if [ -d "$rn/sdks" ] && [ ! -e "$rn/sdks/hermesc/linux64-bin/hermesc" ]; then
              echo "populating $rn/sdks/hermesc"
              mkdir -p "$rn/sdks/hermesc"
              cp -R "$hc/." "$rn/sdks/hermesc/"
            fi
          done
          find node_modules/.pnpm -path '*react-native@*/sdks/hermesc/*-bin/hermesc' -exec chmod +x {} +
          find node_modules/.pnpm -path '*react-native@*/sdks/hermesc/linux64-bin/hermesc' -exec ls -la {} +

      - name: Prebuild Android native project
        working-directory: apps/mobile
        run: npx expo prebuild --platform android

      # Expo's default Gradle heap is too small for this RN app's R8/D8 dex
      # merge (OutOfMemoryError: Java heap space). Raise it after prebuild
      # regenerates gradle.properties.
      - name: Raise Gradle heap for R8 dexing
        working-directory: apps/mobile/android
        run: |
          sed -i '/^org\.gradle\.jvmargs=/d' gradle.properties
          echo "org.gradle.jvmargs=-Xmx6144m -XX:MaxMetaspaceSize=1024m -Dfile.encoding=UTF-8" >> gradle.properties
          grep "^org.gradle.jvmargs=" gradle.properties

      - name: Build release APK
        working-directory: apps/mobile/android
        run: |
          chmod +x ./gradlew
          # Skip release lint: lintVitalAnalyzeRelease OOMs (Metaspace) on the
          # runner across modules and is not needed to produce the APK.
          ./gradlew assembleRelease -x lintVitalRelease -x lintVitalAnalyzeRelease --stacktrace
        env:
          NODE_ENV: production
          CI: "true"

      - name: Copy APK
        run: cp apps/mobile/android/app/build/outputs/apk/release/app-release.apk ./viper-code-mobile.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: viper-code-mobile-release
          path: viper-code-mobile.apk
          if-no-files-found: error
          retention-days: 14

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/') || inputs.release_tag != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.release_tag || github.ref_name }}
          files: |
            viper-code-mobile.apk
          generate_release_notes: true
