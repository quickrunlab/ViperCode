name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install toolchain
        run: npm install -g pnpm@10.24.0 vite-plus@0.1.24

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Windows installer
        run: pnpm dist:desktop:win
        env:
          VIPERCODE_DESKTOP_UPDATE_REPOSITORY: ${{ github.repository }}

      - name: List artifacts
        run: Get-ChildItem release | Select-Object Name, Length
        shell: pwsh

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/*.exe
            release/*.exe.blockmap
            release/latest.yml
          generate_release_notes: true

  android:
    runs-on: ubuntu-latest
    env:
      EXPO_PUBLIC_VIPERCODE_CLERK_PUBLISHABLE_KEY: ${{ secrets.EXPO_PUBLIC_VIPERCODE_CLERK_PUBLISHABLE_KEY }}
      EXPO_PUBLIC_VIPERCODE_CLERK_JWT_TEMPLATE: ${{ secrets.EXPO_PUBLIC_VIPERCODE_CLERK_JWT_TEMPLATE }}
      EXPO_PUBLIC_VIPERCODE_RELAY_URL: ${{ secrets.EXPO_PUBLIC_VIPERCODE_RELAY_URL }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install toolchain
        run: npm install -g pnpm@10.24.0

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Diagnose + fix the prebuilt Hermes compiler that release builds invoke
      # (debug/preview skip Hermes AOT). pnpm's store layout can leave it
      # non-executable or as a dangling symlink.
      - name: Ensure Hermes compiler is executable
        run: |
          echo "=== any hermesc by name ==="
          find node_modules -iname "*hermesc*" 2>/dev/null | head -20
          echo "=== react-native sdks dir ==="
          rn="$(find node_modules/.pnpm -maxdepth 4 -type d -path "*react-native@*/node_modules/react-native" 2>/dev/null | head -1)"
          echo "rn pkg: '$rn'"
          ls -la "$rn/sdks" 2>/dev/null || echo "no sdks dir"
          ls -laR "$rn/sdks/hermesc" 2>/dev/null | head -40 || echo "no hermesc dir"
          echo "=== hermes-engine / hermesc deps ==="
          find node_modules -maxdepth 3 -iname "*hermes*" -type d 2>/dev/null | head

      - name: Prebuild Android native project
        working-directory: apps/mobile
        run: npx expo prebuild --platform android

      - name: Build release APK
        working-directory: apps/mobile/android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleRelease
        env:
          NODE_ENV: production
          CI: "true"

      - name: Copy APK
        run: cp apps/mobile/android/app/build/outputs/apk/release/app-release.apk ./viper-code-mobile.apk

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            viper-code-mobile.apk
          generate_release_notes: true
